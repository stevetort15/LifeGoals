<!-- Página principal: administración de metas de vida -->
<div class="contenedor">
  <h1>Mis metas en la vida</h1>

  <!-- Alta: input con binding bidireccional [(ngModel)] -->
  <div class="fila-form">
    <input type="text" [(ngModel)]="nuevaMeta" name="nuevaMeta"
           placeholder="Escribe una nueva meta..." (keyup.enter)="agregarMeta()">
    <button (click)="agregarMeta()">Agregar</button>
  </div>

  <!-- Lectura: lista de metas con *ngFor y botón de eliminación -->
  <ul class="metas">
    <li *ngFor="let m of metas">
      <span>{{ m.meta }}</span>
      <button class="eliminar" (click)="eliminarMeta(m.id)">Eliminar</button>
    </li>
  </ul>

  <p *ngIf="metas.length === 0">Aún no tienes metas registradas. ¡Agrega la primera!</p>
</div>
